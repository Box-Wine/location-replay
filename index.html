<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Location Replay (Simulation)</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

  <style>
    body { margin: 0; font-family: system-ui, Arial, sans-serif; }
    #topbar { padding: 12px; display: grid; gap: 8px; border-bottom: 1px solid #ddd; }
    #controls { display: flex; gap: 8px; flex-wrap: wrap; align-items: center; }
    button { padding: 10px 12px; border: 1px solid #ccc; background: #fff; border-radius: 8px; }
    button:disabled { opacity: 0.5; }
    #status { font-size: 14px; color: #333; }
    #map { height: calc(100vh - 130px); }
    .pill { display:inline-block; padding: 2px 8px; border:1px solid #ddd; border-radius:999px; font-size:12px; }
    input { padding: 10px 12px; border: 1px solid #ccc; border-radius: 8px; width: 110px; }
  </style>
</head>
<body>
  <div id="topbar">
    <div><span class="pill">Simulation</span> Replays a predefined route from <code>trace.json</code>. No device tracking.</div>

    <div id="controls">
      <button id="loadBtn">Load trace</button>
      <button id="startBtn" disabled>Start</button>
      <button id="pauseBtn" disabled>Pause</button>
      <button id="resetBtn" disabled>Reset</button>

      <label>
        Step (ms):
        <input id="stepMs" type="number" value="1500" min="200" step="100" />
      </label>
    </div>

    <div id="status">Status: not loaded</div>
  </div>

  <div id="map"></div>

  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <script>
    const statusEl = document.getElementById("status");
    const loadBtn = document.getElementById("loadBtn");
    const startBtn = document.getElementById("startBtn");
    const pauseBtn = document.getElementById("pauseBtn");
    const resetBtn = document.getElementById("resetBtn");
    const stepMsEl = document.getElementById("stepMs");

    let trace = [];
    let idx = 0;
    let timer = null;

    const map = L.map("map");
    L.tileLayer("https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png", {
      maxZoom: 19,
      attribution: "© OpenStreetMap contributors"
    }).addTo(map);

    const marker = L.circleMarker([0, 0], {
      radius: 8,
      color: "#1f6feb",
      fillColor: "#1f6feb",
      fillOpacity: 0.9
    }).addTo(map);

    const pathLine = L.polyline([], { color: "#1f6feb", weight: 3, opacity: 0.6 }).addTo(map);

    function setStatus(msg) { statusEl.textContent = "Status: " + msg; }
    function enableControls(loaded) {
      startBtn.disabled = !loaded;
      pauseBtn.disabled = !loaded;
      resetBtn.disabled = !loaded;
    }

    function showPoint(i) {
      const p = trace[i];
      const latlng = [p.lat, p.lon];
      marker.setLatLng(latlng);

      const latlngs = pathLine.getLatLngs();
      latlngs.push(latlng);
      pathLine.setLatLngs(latlngs);

      map.panTo(latlng, { animate: true, duration: 0.5 });
      setStatus(`loaded, index ${i + 1}/${trace.length}, t=${p.t}, lat=${p.lat.toFixed(5)}, lon=${p.lon.toFixed(5)}`);
    }

    async function loadTrace() {
      setStatus("loading trace.json...");
      const res = await fetch("./trace.json", { cache: "no-store" });
      if (!res.ok) throw new Error("Failed to load trace.json");
      trace = await res.json();

      if (!Array.isArray(trace) || trace.length < 2) {
        throw new Error("trace.json must be an array with at least 2 points");
      }

      idx = 0;
      pathLine.setLatLngs([]);

      const bounds = L.latLngBounds(trace.map(p => [p.lat, p.lon]));
      map.fitBounds(bounds.pad(0.2));

      showPoint(0);
      enableControls(true);
    }

    function start() {
      if (!trace.length) return;
      if (timer) return;

      const stepMs = Number(stepMsEl.value || 1500);
      setStatus("running...");

      timer = setInterval(() => {
        idx += 1;
        if (idx >= trace.length) {
          pause();
          setStatus("finished replay");
          return;
        }
        showPoint(idx);
      }, stepMs);
    }

    function pause() {
      if (timer) clearInterval(timer);
      timer = null;
      if (trace.length && idx < trace.length - 1) setStatus("paused");
    }

    function reset() {
      pause();
      idx = 0;
      pathLine.setLatLngs([]);
      showPoint(0);
      setStatus("reset to start");
    }

    loadBtn.addEventListener("click", async () => {
      try { await loadTrace(); }
      catch (e) { setStatus("error: " + e.message); enableControls(false); }
    });
    startBtn.addEventListener("click", start);
    pauseBtn.addEventListener("click", pause);
    resetBtn.addEventListener("click", reset);

    map.setView([-26.2041, 28.0473], 13);
  </script>
</body>
</html>
